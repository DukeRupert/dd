<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer record border -->
  <circle cx="100" cy="100" r="98" fill="#1f2937" />
  
  <!-- Inner vinyl surface -->
  <circle cx="100" cy="100" r="92" fill="#374151" />
  
  <!-- Record grooves -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#4b5563" stroke-width="0.5" />
  <circle cx="100" cy="100" r="70" fill="none" stroke="#4b5563" stroke-width="0.5" />
  <circle cx="100" cy="100" r="60" fill="none" stroke="#4b5563" stroke-width="0.5" />
  <circle cx="100" cy="100" r="50" fill="none" stroke="#4b5563" stroke-width="0.5" />
  <circle cx="100" cy="100" r="40" fill="none" stroke="#4b5563" stroke-width="0.5" />
  
  <!-- Label area -->
  <circle cx="100" cy="100" r="30" fill="#4b5563" />
  
  <!-- Center hole -->
  <circle cx="100" cy="100" r="4" fill="#1f2937" />
  
  <!-- Reflection highlight -->
  <path d="M60,40 A60,60 0 0,1 140,40" fill="none" stroke="#6b7280" stroke-width="2" opacity="0.3" />
</svg>